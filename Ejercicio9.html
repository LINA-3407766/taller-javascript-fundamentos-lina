<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 9 - Clínica Veterinaria</title>
</head>
<body>

<script>

// Ejercicio 9 - Conversión de edad de mascotas a años humanos

// Solicitar los datos de la mascota
let nombre = prompt("Ingrese el nombre de la mascota:");
let tipo = prompt("Ingrese el tipo de mascota (perro o gato):").toLowerCase();
let edad = parseInt(prompt("Ingrese la edad de la mascota:"));

let edadHumana;

// Calcular la edad humana según el tipo de mascota
if (tipo == "perro") {

    edadHumana = edad > 2
        ? (2 * 10.5) + ((edad - 2) * 4)
        : edad * 10.5;

} else if (tipo == "gato") {

    edadHumana = edad > 2
        ? (2 * 12) + ((edad - 2) * 4)
        : edad * 12;

} else {

    // Mostrar mensaje si el tipo de mascota no es válido
    alert("Tipo de mascota no reconocido");

}

// Mostrar la información de la mascota y el resultado
if (tipo == "perro" || tipo == "gato") {

    document.write("<h2>Información de la Mascota</h2>");

    document.write("Nombre: " + nombre + "<br><br>");

    document.write("Tipo: " + tipo + "<br><br>");

    document.write("Edad de la mascota: " + edad + " años<br><br>");

    document.write("Edad en años humanos: " + edadHumana);

}

</script>

</body>
</html>
